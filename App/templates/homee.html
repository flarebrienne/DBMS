<!DOCTYPE html>
<html>

<head>
    <title>Connection Status</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f4f4f4;
            font-family: Arial, sans-serif;
        }

        .box {
            background-color: orange;
            padding: 40px 60px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        h1 {
            color: white;
            margin-bottom: 20px;
        }

        p {
            color: white;
            font-size: 20px;
            margin-top: 20px;
        }

        .buttons {
            margin-top: 10px;
        }

        button {
            padding: 10px 20px;
            margin: 8px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }

        .open-btn {
            background-color: green;
            color: white;
        }

        .close-btn {
            background-color: red;
            color: white;
        }

        button:hover {
            opacity: 0.9;
        }
    </style>
</head>

<body>
    <div class="box">
        <h1>Connected</h1>

        <div class="buttons">
            <button class="open-btn">Open Connection</button>
            <button class="close-btn">Close Connection</button>
        </div>

        <p>Abdourahman, Bikash, Farhana</p>
    </div>
</body>

</html>
