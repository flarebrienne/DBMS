<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hospital MS Login</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #dff6ff, #f8fbff);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            background: white;
            padding: 35px;
            border-radius: 16px;
            width: 430px;
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.12);
        }

        h1 {
            text-align: center;
            margin-bottom: 8px;
            color: #1f4e79;
        }

        p {
            text-align: center;
            color: #666;
            margin-bottom: 22px;
        }

        label {
            display: block;
            margin-top: 14px;
            font-weight: 600;
        }

        input,
        select,
        button,
        a.signup-btn {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            border-radius: 8px;
            border: 1px solid #ccc;
            box-sizing: border-box;
            font-size: 15px;
        }

        button {
            background: #0077b6;
            color: white;
            border: none;
            cursor: pointer;
            margin-top: 18px;
        }

        button:hover {
            background: #005f8f;
        }

        a.signup-btn {
            display: block;
            text-decoration: none;
            text-align: center;
            background: #28a745;
            color: white;
            margin-top: 12px;
        }

        .flash {
            background: #ffe6e6;
            color: #b30000;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>Hospital MS Login</h1>
        <p>Secure access for doctor, nurse, patient, and admin</p>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="flash">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="/">
            <label for="role">Login As</label>
            <select name="role" id="role" required>
                <option value="">Select role</option>
                <option value="doctor">Doctor</option>
                <option value="nurse">Nurse</option>
                <option value="patient">Patient</option>
                <option value="admin">Admin</option>
            </select>

            <label for="email">Email</label>
            <input type="email" name="email" id="email" required>

            <label for="password">Password</label>
            <input type="password" name="password" id="password" required>

            <button type="submit">Login</button>
        </form>

        <a class="signup-btn" href="/signup">Create New Account</a>
    </div>
</body>
</html>
