<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ role_name }} Menu</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #f1f8ff, #eef2f3);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .menu-box {
            background: white;
            padding: 40px;
            border-radius: 18px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.12);
            width: 420px;
            text-align: center;
        }

        h1 {
            margin-bottom: 30px;
            color: #2c3e50;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            margin: 12px 0;
            border: none;
            border-radius: 8px;
            font-size: 17px;
            color: white;
            text-decoration: none;
            box-sizing: border-box;
        }

        .add-btn {
            background-color: #28a745;
        }

        .update-btn {
            background-color: #007bff;
        }

        .delete-btn {
            background-color: #dc3545;
        }

        .home-btn {
            background-color: #6c757d;
            margin-top: 20px;
        }

        .btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="menu-box">
        <h1>{{ role_name }} Menu</h1>

        <a class="btn add-btn" href="{{ add_url }}">Add {{ role_name }}</a>
        <a class="btn update-btn" href="{{ update_url }}">Update {{ role_name }}</a>
        <a class="btn delete-btn" href="{{ delete_url }}">Delete {{ role_name }}</a>
        <a class="btn home-btn" href="/">Back to Home</a>
    </div>
</body>
</html>
