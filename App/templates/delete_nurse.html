<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Delete Nurse</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .form-container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 380px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h2 { text-align: center; }
        select, button {
            display: block;
            margin-top: 12px;
            padding: 10px;
            width: 100%;
            border-radius: 5px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }
        button {
            background-color: #e74c3c;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover { background-color: #c0392b; }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Delete Nurse</h2>
        <form action="/delete_nurse" method="POST">
            <label for="nurse_id">Select Nurse</label>
            <select name="nurse_id" id="nurse_id" required>
                {% for nurse in nurses %}
                <option value="{{ nurse[0] }}">
                    {{ nurse[1] }} {{ nurse[2] }} (ID: {{ nurse[0] }})
                </option>
                {% endfor %}
            </select>
            <button type="submit">Delete Nurse</button>
        </form>
    </div>
</body>
</html>
