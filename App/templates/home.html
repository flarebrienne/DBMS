<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hospital Management System</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #e0f7fa, #f4f4f4);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 90%;
            max-width: 1100px;
            text-align: center;
        }

        h1 {
            margin-bottom: 40px;
            color: #2c3e50;
            font-size: 40px;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
        }

        .card {
            background: white;
            border-radius: 18px;
            padding: 35px 25px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.12);
            transition: transform 0.25s, box-shadow 0.25s;
            text-decoration: none;
            color: inherit;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 14px 30px rgba(0, 0, 0, 0.18);
        }

        .card h2 {
            margin-bottom: 12px;
            color: #0077b6;
            font-size: 28px;
        }

        .card p {
            font-size: 16px;
            color: #555;
        }

        @media (max-width: 768px) {
            .card-grid {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 30px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hospital Management System</h1>

        <div class="card-grid">
            <a class="card" href="/doctor_menu">
                <h2>Doctor</h2>
                <p>Manage doctor records and operations</p>
            </a>

            <a class="card" href="/patient_menu">
                <h2>Patient</h2>
                <p>Manage patient records and operations</p>
            </a>

            <a class="card" href="/nurse_menu">
                <h2>Nurse</h2>
                <p>Manage nurse records and operations</p>
            </a>

            <a class="card" href="/admin_menu">
                <h2>Administrator</h2>
                <p>Manage hospital administrator records</p>
            </a>
        </div>
    </div>
</body>
</html>
