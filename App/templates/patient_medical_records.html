{% extends "patient_profile.html" %}

{% block patient_tab_content %}



<div class="panel">
    <div class="panel-header">
        Medical Records

        <!-- ✅ ICON instead of button -->
        <button class="icon-btn" onclick="openModal()" title="Add Note">
            <i class="fas fa-plus-circle"></i>
        </button>
    </div>

    <div class="panel-body">
        <table class="simple-table">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Type</th>
                    <th>Note</th>
                    <th>Nurse</th>
                </tr>
            </thead>
            <tbody>
                {% for record in medical_records %}
                <tr>
                    <td>{{ record.date_time }}</td>
                    <td>{{ record.note_type }}</td>
                    <td>{{ record.note_text }}</td>
                    <td>{{ record.nurse_name }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

<!-- ✅ Modal -->
<div id="noteModal" class="modal">
    <div class="modal-content">
        <h3>Add Medical Note</h3>

        <form method="POST" action="{{ url_for('add_note', patient_id=patient.patient_id) }}">

            <div class="form-group">
                <label>Type</label>
                <select name="note_type">
                    <option value="Consultation">Consultation</option>
                    <option value="Vitals">Vitals</option>
                    <option value="Diagnosis">Diagnosis</option>
                    <option value="Procedure">Procedure</option>
                </select>
            </div>

            <div class="form-group">
                <label>Note</label>
                <textarea name="note_text" rows="4" required></textarea>
            </div>

            <div class="modal-actions">
                <button type="button" class="close-btn" onclick="closeModal()">Cancel</button>
                <button type="submit" class="submit-btn">Save</button>
            </div>
        </form>
    </div>
</div>

<script>
    function openModal() {
        document.getElementById("noteModal").style.display = "block";
    }

    function closeModal() {
        document.getElementById("noteModal").style.display = "none";
    }

    window.onclick = function (event) {
        let modal = document.getElementById("noteModal");
        if (event.target === modal) {
            modal.style.display = "none";
        }
    }
</script>

{% endblock %}
